name: Release

# TODO: Update these to match your project
env:
  ASSEMBLY_NAME: Project           # AssemblyName from csproj (used for archive/release asset names)
  PROJECT_NAME: Project            # csproj project name without extension (used for artifact output paths)
  PROJECT_FILE: src/Project/Project.csproj

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive: zip
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore template-dotnet-console.slnx

    - name: Test
      run: dotnet test template-dotnet-console.slnx -c Release --verbosity normal

    - name: Publish
      # With UseArtifactsOutput, output lands at artifacts/publish/<ProjectName>/release_<rid>/
      run: dotnet publish ${{ env.PROJECT_FILE }} -c Release -r ${{ matrix.rid }} --self-contained

    - name: Copy documentation
      shell: pwsh
      run: |
        $dist = "artifacts/publish/${{ env.PROJECT_NAME }}/release_${{ matrix.rid }}"
        Copy-Item LICENSE $dist/ -ErrorAction SilentlyContinue
        Copy-Item README.md $dist/

    - name: Create archive (Windows)
      if: matrix.archive == 'zip'
      shell: pwsh
      run: |
        Compress-Archive -Path artifacts/publish/${{ env.PROJECT_NAME }}/release_${{ matrix.rid }}/* -DestinationPath ${{ env.ASSEMBLY_NAME }}-${{ matrix.rid }}.zip

    - name: Create archive (Linux)
      if: matrix.archive == 'tar.gz'
      run: |
        cd artifacts/publish/${{ env.PROJECT_NAME }}/release_${{ matrix.rid }}
        tar -czf ../../../../${{ env.ASSEMBLY_NAME }}-${{ matrix.rid }}.tar.gz *
        cd -

    - name: Generate checksum
      shell: pwsh
      run: |
        $hash = Get-FileHash -Path ${{ env.ASSEMBLY_NAME }}-${{ matrix.rid }}.${{ matrix.archive }} -Algorithm SHA256
        "$($hash.Hash)  ${{ env.ASSEMBLY_NAME }}-${{ matrix.rid }}.${{ matrix.archive }}" | Out-File -FilePath checksum-${{ matrix.rid }}.txt -Encoding ascii

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ASSEMBLY_NAME }}-${{ matrix.rid }}
        path: |
          ${{ env.ASSEMBLY_NAME }}-${{ matrix.rid }}.${{ matrix.archive }}
          checksum-${{ matrix.rid }}.txt

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4

    - name: Combine checksums
      run: |
        cat ${{ env.ASSEMBLY_NAME }}-win-x64/checksum-win-x64.txt > checksums.txt
        cat ${{ env.ASSEMBLY_NAME }}-linux-x64/checksum-linux-x64.txt >> checksums.txt

    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: v${{ steps.version.outputs.version }}
        draft: false
        prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        generate_release_notes: true
        files: |
          ${{ env.ASSEMBLY_NAME }}-win-x64/${{ env.ASSEMBLY_NAME }}-win-x64.zip
          ${{ env.ASSEMBLY_NAME }}-linux-x64/${{ env.ASSEMBLY_NAME }}-linux-x64.tar.gz
          checksums.txt
